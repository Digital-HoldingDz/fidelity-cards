<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redirection…</title>
<style>
  body { background:#0a0a0a; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; font-family:sans-serif; }
  a {
    display:block; padding:1.2rem 2rem;
    background:linear-gradient(135deg,#C9A84C,#FEC715);
    color:#000; font-weight:700; font-size:1rem;
    text-decoration:none; border-radius:14px;
    letter-spacing:0.1em; text-align:center;
  }
</style>
</head>
<body>
<script>
  const p = new URLSearchParams(window.location.search);
  const carte = p.get('carte') || '';
  const base = "https://script.google.com/macros/s/AKfycbyI7GmpUp-0_RhY9BTTXCJ6ijrH8-XZ5tK48X6pIS_xaSBAgU3PbcwkEZlHO-D5QSiY/exec";
  const dest = base + "?carte=" + encodeURIComponent(carte) + "&mode=vendeur";

  // Crée un lien visible ET clique dessus immédiatement
  const a = document.createElement('a');
  a.href = dest;
  a.textContent = '▶ Accéder à la carte ' + carte;
  // PAS de target="_blank" — on reste dans le même onglet
  // Cela évite l'interception Drive sur Android
  document.body.appendChild(a);
  a.click();
</script>
</body>
</html>
